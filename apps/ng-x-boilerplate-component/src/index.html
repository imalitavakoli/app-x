<!doctype html>
<html lang="en">
  <head>
    <title>X</title>
    <base href="./" />
    <meta charset="utf-8" />

    <!-- No cache -->
    <meta
      http-equiv="Cache-control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Mobile -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, shrink-to-fit=no"
    />
    <meta name="theme-color" content="#ffffff" />

    <!-- Icon & Manifest -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
  </head>

  <body class="e-main">
    <!-- 
    Like to run this app as an iframe inside your own app/site?
    Follow the following steps:

    1: Use our API to receive a `ticket-id` with `status = 'completed'`.

    2: Load this app with a similar URL as below to authenticate your user:
    http://thisapp.com/?com=initializer-v1,x-full-dashboard-v1&ticket-id=xxx&user-id=123

    NOTE: What are the available components to load? Please check 
    `./index.iframe-v1.html` file as an example to learn more. Cheers!
    -->

    <!-- App-Shell: START ////////////////////////////////////////////////// -->

    <!-- prettier-ignore -->
    <style>.e-preloader{--e-preloader__bar--color:255 255 255;--e-preloader--bg-color:136 136 136}.e-preloader{position:fixed;display:flex;justify-content:center;align-items:center;top:0;left:0;width:100vw;height:100vh;background-color:rgb(var(--e-preloader--bg-color));z-index:3000;transition:visibility .4s,opacity .4s}.e-preloader--loaded{visibility:hidden;opacity:0}.e-preloader__bar{min-width:100px;min-height:100px;color:rgb(var(--e-preloader__bar--color));user-select:none;pointer-events:none}.e-preloader__bar svg{animation:spin-preloader 1.5s linear infinite}.e-preloader__bar svg circle,.e-preloader__bar svg path,.e-preloader__bar svg rect{fill:rgb(var(--e-preloader__bar--color))}@keyframes spin-preloader{100%{transform:rotate(360deg)}}</style>

    <!-- prettier-ignore -->
    <div class="e-preloader" id="loader">
      <div class="e-preloader__bar">
        <svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" preserveAspectRatio="xMidYMid meet" viewBox="0 0 100 100" style="stroke:none">
          <path d="M73,50c0-12.7-10.3-23-23-23S27,37.3,27,50 M30.9,50c0-10.5,8.5-19.1,19.1-19.1S69.1,39.5,69.1,50"></path>
        </svg>
      </div>
    </div>

    <!-- prettier-ignore -->
    <script>window.appReady = function () {const loader = document.getElementById('loader');if (loader) {loader.classList.add('e-preloader--loaded');}};</script>

    <!-- App-Shell: END //////////////////////////////////////////////////// -->

    <x-root></x-root>
    <noscript>
      Please enable JavaScript to continue using this application.
    </noscript>
  </body>
</html>
