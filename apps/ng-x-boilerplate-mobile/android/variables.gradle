ext {
    minSdkVersion = 26
    compileSdkVersion = 36
    targetSdkVersion = 36
    androidxActivityVersion = '1.11.0'
    androidxAppCompatVersion = '1.7.1'
    androidxCoordinatorLayoutVersion = '1.3.0'
    androidxCoreVersion = '1.17.0'
    androidxFragmentVersion = '1.8.9'
    coreSplashScreenVersion = '1.2.0'
    androidxWebkitVersion = '1.14.0'
    junitVersion = '4.13.2'
    androidxJunitVersion = '1.3.0'
    androidxEspressoCoreVersion = '3.7.0'
    cordovaAndroidVersion = '14.0.1'

    // https://capacitorjs.com/docs/apis/browser#variables
    androidxBrowserVersion = '1.9.0'

    // https://capacitorjs.com/docs/apis/push-notifications#variables
    firebaseMessagingVersion = '25.0.1'

    // https://github.com/capawesome-team/capacitor-firebase/tree/main/packages/analytics
    $firebaseAnalyticsVersion = '23.0.0'

    // https://github.com/capawesome-team/capacitor-plugins/tree/main/packages/live-update
    $okhttp3Version = '5.3.2'
    $zip4jVersion = '2.11.5'

    // https://github.com/capawesome-team/capacitor-firebase/tree/main/packages/crashlytics
    $firebaseCrashlyticsVersion = '20.0.3'

    // https://github.com/capawesome-team/capacitor-firebase/tree/main/packages/performance
    $firebasePerfVersion = '22.0.48'

    // https://github.com/capawesome-team/capacitor-firebase/tree/main/packages/remote-config
    $firebaseConfigVersion = '23.0.1'

    // https://github.com/capawesome-team/capacitor-plugins/tree/main/packages/app-update
    $androidPlayAppUpdateVersion = '2.1.0'
    $androidPlayServicesBaseVersion = '18.9.0'

    // https://capacitorjs.com/docs/guides/ads
    playServicesAdsVersion = '23.0.0'
    androidxCoreKTXVersion = '1.13.0'

    // https://github.com/capawesome-team/capacitor-firebase/tree/main/packages/authentication
    // https://github.com/capawesome-team/capacitor-firebase/blob/main/packages/authentication/docs/setup-google.md
    rgcfaIncludeGoogle = true
    androidxCredentialsVersion = '1.3.0'

    // https://github.com/capawesome-team/capacitor-firebase/tree/main/packages/firestore
    $firebaseFirestoreVersion = '26.0.2'

    // https://github.com/capawesome-team/capacitor-firebase/tree/main/packages/storage
    $firebaseStorageVersion = '22.0.1'

    // https://github.com/capawesome-team/capacitor-plugins/tree/main/packages/app-review
    $androidPlayReviewVersion = '2.0.2'   
}
